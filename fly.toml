app = 'tooljet-byrdson'
primary_region = 'sin'
kill_signal = 'SIGTERM'
kill_timeout = '2m0s'

[build]
  image = 'tooljet/tooljet-ce:v3.20.112-lts'

[deploy]
  release_command = 'npm run db:migrate:prod' # db:setup:prod if new deploy
  wait_timeout = '10m' # 30m if new deploy

  [deploy.release_command_vm]
    size = 'shared-cpu-2x'
    memory = '4gb'

[env]
#  SERVE_CLIENT = 'true'
  PORT = '8080'
  TOOLJET_HOST = 'https://tooljet.byrdsonservices.com'
#  PG_DB = 'postgres'
#  PG_USER = 'postgres'
#  PG_PORT = '5432'
#  TOOLJET_DB = 'tooljet_db'
#  TOOLJET_DB_USER = 'postgres'
  PGRST_HOST = 'localhost:3002'
  PGRST_SERVER_PORT = '3002'
  PGRST_DB_PRE_CONFIG = 'postgrest.pre_config'
#  CHECK_FOR_UPDATES = 'true'
#  ENABLE_MULTIPLAYER_EDITING = 'false'
#  ENABLE_MARKETPLACE_FEATURE = 'true'
  WORKER = 'false'
#  USER_SESSION_EXPIRY = '2880'
  DISABLE_SIGNUPS = 'true'
  DEPLOYMENT_PLATFORM = 'docker'
#  WORKFLOW_TIMEOUT_SECONDS = '60'
  NODE_TLS_REJECT_UNAUTHORIZED = '0'

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0
  processes = ['app']

  [http_service.concurrency]
    type = 'requests'
    hard_limit = 100
    soft_limit = 50

[[vm]]
  size = 'shared-cpu-2x'
  memory = '2GB'

[experimental]
  cmd = ["npm", "run", "start:prod"]